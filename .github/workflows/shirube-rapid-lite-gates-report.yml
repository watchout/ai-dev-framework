name: Shirube Rapid/Lite Gates Report

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  NODE_VERSION: "20"
  RESULT_DIR: .shirube-rapid-lite

jobs:
  shirube-rapid-lite-gates-report:
    name: Shirube Rapid/Lite Gates Report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect PR inputs
        env:
          BASE_REF: ${{ github.base_ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          mkdir -p "$RESULT_DIR"
          node <<'NODE'
          const { execFileSync } = require("child_process");
          const fs = require("fs");
          const resultDir = process.env.RESULT_DIR;
          const event = JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH, "utf8"));
          fs.writeFileSync(`${resultDir}/pr-body.md`, event.pull_request?.body ?? "");

          const attempts = [
            {
              label: "base-head-sha-three-dot",
              args: ["diff", "--name-only", `${process.env.BASE_SHA}...${process.env.HEAD_SHA}`],
            },
            {
              label: "base-head-sha-two-dot",
              args: ["diff", "--name-only", process.env.BASE_SHA, process.env.HEAD_SHA],
            },
            {
              label: "origin-base-three-dot",
              before: ["fetch", "--no-tags", "--prune", "origin", process.env.BASE_REF],
              args: ["diff", "--name-only", `origin/${process.env.BASE_REF}...HEAD`],
            },
            {
              label: "head-parent",
              args: ["diff", "--name-only", "HEAD^", "HEAD"],
            },
          ];
          const errors = [];
          for (const attempt of attempts) {
            try {
              if (attempt.before) execFileSync("git", attempt.before, { encoding: "utf8", stdio: ["ignore", "pipe", "pipe"] });
              const stdout = execFileSync("git", attempt.args, { encoding: "utf8", stdio: ["ignore", "pipe", "pipe"] });
              fs.writeFileSync(`${resultDir}/changed-files.txt`, stdout);
              fs.writeFileSync(`${resultDir}/input-collection.json`, JSON.stringify({
                schema: "shirube-rapid-lite-input-collection/v1",
                status: "PASS",
                method: attempt.label,
              }, null, 2) + "\n");
              process.exit(0);
            } catch (error) {
              errors.push({
                method: attempt.label,
                message: error.stderr?.toString?.().trim() || error.message,
              });
            }
          }
          fs.writeFileSync(`${resultDir}/changed-files.txt`, "");
          fs.writeFileSync(`${resultDir}/input-failure.json`, JSON.stringify({
            schema: "shirube-rapid-lite-input-collection/v1",
            status: "FAILURE",
            code: "changed_files_collection_failed",
            message: "Unable to collect PR changed files from available merge-base strategies.",
            attempts: errors,
          }, null, 2) + "\n");
          NODE

      - name: Resolve comment-backed structured audit evidence
        env:
          ACTUAL_REPO: ${{ github.repository }}
          ACTUAL_PR: ${{ github.event.pull_request.number }}
          ACTUAL_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set +e
          STRUCTURED_AUDIT_REF="$(node <<'NODE'
          const fs = require("fs");
          const body = fs.readFileSync(`${process.env.RESULT_DIR}/pr-body.md`, "utf8");
          process.stdout.write(refFromBody(body, ["structured_audit_ref", "structured_audit", "structured-audit"]) || "");
          function refFromBody(body, keys) {
            for (const key of keys) {
              const pattern = new RegExp(`(?:^|\\n)\\s*(?:[-*]\\s*)?(?:${key.replace(/[.*+?^${}()|[\\]\\\\]/g, "\\\\$&")})\\s*:\\s*([^\\n]+?)\\s*(?=\\n|$)`, "i");
              const value = body.match(pattern)?.[1]?.trim().replace(/^["'`]|["'`]$/g, "");
              if (value && value !== "null") return value.split(/\s+/)[0];
            }
            return null;
          }
          NODE
          )"
          STRUCTURED_AUDIT_COMMENT_REF="$(node <<'NODE'
          const fs = require("fs");
          const body = fs.readFileSync(`${process.env.RESULT_DIR}/pr-body.md`, "utf8");
          process.stdout.write(refFromBody(body, ["structured_audit_comment_ref", "structured_audit_comment", "structured-audit-comment"]) || "");
          function refFromBody(body, keys) {
            for (const key of keys) {
              const pattern = new RegExp(`(?:^|\\n)\\s*(?:[-*]\\s*)?(?:${key.replace(/[.*+?^${}()|[\\]\\\\]/g, "\\\\$&")})\\s*:\\s*([^\\n]+?)\\s*(?=\\n|$)`, "i");
              const value = body.match(pattern)?.[1]?.trim().replace(/^["'`]|["'`]$/g, "");
              if (value && value !== "null") return value.split(/\s+/)[0];
            }
            return null;
          }
          NODE
          )"
          node scripts/shirube/resolve-structured-audit-ref.mjs \
            --structured-audit-ref "$STRUCTURED_AUDIT_REF" \
            --structured-audit-comment-ref "$STRUCTURED_AUDIT_COMMENT_REF" \
            --actual-repo "$ACTUAL_REPO" \
            --actual-pr "$ACTUAL_PR" \
            --actual-head "$ACTUAL_HEAD" \
            --result-dir "$RESULT_DIR" \
            --github-token-env GITHUB_TOKEN \
            --format json > "$RESULT_DIR/structured-audit-ref-resolution.json"
          cat "$RESULT_DIR/structured-audit-ref-resolution.json"
          node <<'NODE'
          const fs = require("fs");
          const reportPath = `${process.env.RESULT_DIR}/structured-audit-ref-resolution.json`;
          const bodyPath = `${process.env.RESULT_DIR}/pr-body.md`;
          let report;
          try {
            report = JSON.parse(fs.readFileSync(reportPath, "utf8"));
          } catch (error) {
            report = { verdict: "FAILURE", materialized_path: null, source_metadata_path: null };
          }
          const lines = [];
          if (report.materialized_path) lines.push(`structured_audit_ref: ${report.materialized_path}`);
          if (report.source_metadata_path) lines.push(`structured_audit_source_ref: ${report.source_metadata_path}`);
          if (lines.length > 0) fs.appendFileSync(bodyPath, `\n<!-- shirube:structured-audit-resolution/v1 -->\n${lines.join("\n")}\n`);
          NODE
          exit 0

      - name: Resolve comment-backed additional review evidence
        env:
          ACTUAL_REPO: ${{ github.repository }}
          ACTUAL_PR: ${{ github.event.pull_request.number }}
          ACTUAL_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set +e
          ADDITIONAL_REVIEW_REF="$(node <<'NODE'
          const fs = require("fs");
          const body = fs.readFileSync(`${process.env.RESULT_DIR}/pr-body.md`, "utf8");
          process.stdout.write(refFromBody(body, ["additional_review_ref", "additional_review", "additional-review", "protected_review_ref", "protected_review"]) || "");
          function refFromBody(body, keys) {
            for (const key of keys) {
              const pattern = new RegExp(`(?:^|\\n)\\s*(?:[-*]\\s*)?(?:${key.replace(/[.*+?^${}()|[\\]\\\\]/g, "\\\\$&")})\\s*:\\s*([^\\n]+?)\\s*(?=\\n|$)`, "i");
              const value = body.match(pattern)?.[1]?.trim().replace(/^["'`]|["'`]$/g, "");
              if (value && value !== "null") return value.split(/\s+/)[0];
            }
            return null;
          }
          NODE
          )"
          ADDITIONAL_REVIEW_COMMENT_REF="$(node <<'NODE'
          const fs = require("fs");
          const body = fs.readFileSync(`${process.env.RESULT_DIR}/pr-body.md`, "utf8");
          process.stdout.write(refFromBody(body, ["additional_review_comment_ref", "additional_review_comment", "additional-review-comment", "protected_review_comment_ref", "protected_review_comment"]) || "");
          function refFromBody(body, keys) {
            for (const key of keys) {
              const pattern = new RegExp(`(?:^|\\n)\\s*(?:[-*]\\s*)?(?:${key.replace(/[.*+?^${}()|[\\]\\\\]/g, "\\\\$&")})\\s*:\\s*([^\\n]+?)\\s*(?=\\n|$)`, "i");
              const value = body.match(pattern)?.[1]?.trim().replace(/^["'`]|["'`]$/g, "");
              if (value && value !== "null") return value.split(/\s+/)[0];
            }
            return null;
          }
          NODE
          )"
          node scripts/shirube/resolve-additional-review-ref.mjs \
            --additional-review-ref "$ADDITIONAL_REVIEW_REF" \
            --additional-review-comment-ref "$ADDITIONAL_REVIEW_COMMENT_REF" \
            --actual-repo "$ACTUAL_REPO" \
            --actual-pr "$ACTUAL_PR" \
            --actual-head "$ACTUAL_HEAD" \
            --result-dir "$RESULT_DIR" \
            --github-token-env GITHUB_TOKEN \
            --format json > "$RESULT_DIR/additional-review-ref-resolution.json"
          cat "$RESULT_DIR/additional-review-ref-resolution.json"
          node <<'NODE'
          const fs = require("fs");
          const reportPath = `${process.env.RESULT_DIR}/additional-review-ref-resolution.json`;
          const bodyPath = `${process.env.RESULT_DIR}/pr-body.md`;
          let report;
          try {
            report = JSON.parse(fs.readFileSync(reportPath, "utf8"));
          } catch (error) {
            report = { verdict: "FAILURE", materialized_path: null, materialized_paths: [], source_metadata_path: null };
          }
          const materialized = Array.isArray(report.materialized_paths) && report.materialized_paths.length > 0
            ? report.materialized_paths.join(",")
            : report.materialized_path;
          const lines = [];
          if (materialized) lines.push(`additional_review_ref: ${materialized}`);
          if (report.source_metadata_path) lines.push(`additional_review_source_ref: ${report.source_metadata_path}`);
          if (lines.length > 0) fs.appendFileSync(bodyPath, `\n<!-- shirube:additional-review-resolution/v1 -->\n${lines.join("\n")}\n`);
          NODE
          exit 0

      - name: Run Rapid/Lite gates
        run: |
          INPUT_FAILURE_ARG=""
          if [ -f "$RESULT_DIR/input-failure.json" ]; then
            INPUT_FAILURE_ARG="--input-failure $RESULT_DIR/input-failure.json"
          fi
          node scripts/shirube/run-rapid-lite-report.mjs \
            --result-dir "$RESULT_DIR" \
            --changed-files "$RESULT_DIR/changed-files.txt" \
            --pr-body "$RESULT_DIR/pr-body.md" \
            --diff-root . \
            $INPUT_FAILURE_ARG \
            --format json > "$RESULT_DIR/workflow-output.json"
          cat "$RESULT_DIR/summary.md" >> "$GITHUB_STEP_SUMMARY"
          cat "$RESULT_DIR/aggregate.json"

      - name: Upsert PR comment
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- shirube-rapid-lite-gates-report/v1 -->";
            const body = fs.existsSync(".shirube-rapid-lite/summary.md")
              ? fs.readFileSync(".shirube-rapid-lite/summary.md", "utf8")
              : `${marker}\n\n## Shirube Rapid/Lite Gates Report\n\nReport generation failed before summary creation.`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const previous = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );
            if (previous) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: previous.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Upload Rapid/Lite gate JSON artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shirube-rapid-lite-gates-${{ github.event.pull_request.number }}
          path: ${{ env.RESULT_DIR }}
          if-no-files-found: warn
          retention-days: 14
          include-hidden-files: true

      - name: Report-only completion
        if: always()
        run: |
          echo "Shirube Rapid/Lite gates are report-only in this pilot."
          echo "PASS, PASS_WITH_WARN, and BLOCKED verdicts are recorded as PR evidence without failing this workflow."
          exit 0
