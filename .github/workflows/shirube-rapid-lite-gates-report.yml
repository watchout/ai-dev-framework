name: Shirube Rapid/Lite Gates Report

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  NODE_VERSION: "20"
  RESULT_DIR: .shirube-rapid-lite

jobs:
  shirube-rapid-lite-gates-report:
    name: Shirube Rapid/Lite Gates Report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect PR inputs
        run: |
          mkdir -p "$RESULT_DIR"
          git fetch origin "${{ github.base_ref }}" --depth=1
          git diff --name-only "origin/${{ github.base_ref }}...HEAD" > "$RESULT_DIR/changed-files.txt"
          node <<'NODE'
          const fs = require("fs");
          const event = JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH, "utf8"));
          fs.writeFileSync(".shirube-rapid-lite/pr-body.md", event.pull_request?.body ?? "");
          NODE

      - name: Run Rapid/Lite gates
        run: |
          node scripts/shirube/run-rapid-lite-report.mjs \
            --result-dir "$RESULT_DIR" \
            --changed-files "$RESULT_DIR/changed-files.txt" \
            --pr-body "$RESULT_DIR/pr-body.md" \
            --diff-root . \
            --format json > "$RESULT_DIR/workflow-output.json"
          cat "$RESULT_DIR/summary.md" >> "$GITHUB_STEP_SUMMARY"
          cat "$RESULT_DIR/aggregate.json"

      - name: Upsert PR comment
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- shirube-rapid-lite-gates-report/v1 -->";
            const body = fs.existsSync(".shirube-rapid-lite/summary.md")
              ? fs.readFileSync(".shirube-rapid-lite/summary.md", "utf8")
              : `${marker}\n\n## Shirube Rapid/Lite Gates Report\n\nReport generation failed before summary creation.`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const previous = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );
            if (previous) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: previous.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Upload Rapid/Lite gate JSON artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shirube-rapid-lite-gates-${{ github.event.pull_request.number }}
          path: ${{ env.RESULT_DIR }}
          if-no-files-found: warn
          retention-days: 14
          include-hidden-files: true

      - name: Report-only completion
        if: always()
        run: |
          echo "Shirube Rapid/Lite gates are report-only in this pilot."
          echo "PASS, PASS_WITH_WARN, and BLOCKED verdicts are recorded as PR evidence without failing this workflow."
          exit 0
