source_refs:
  parent_ssot: https://github.com/watchout/ai-dev-framework/issues/405
  pr1_source: https://github.com/watchout/ai-dev-framework/pull/413
  pr2_source: https://github.com/watchout/ai-dev-framework/issues/414
  local_spec: docs/spec/shirube-v2.1-enterprise-governance.md
classified_artifact:
  kind: pull_request
  repository: watchout/ai-dev-framework
  issue: 414
  path_scope:
    - docs/spec/fixtures/shirube-v2.1/
    - docs/spec/shirube-v2.1-enterprise-governance.md
    - docs/impl/shirube-v2.1-enterprise-governance.md
    - docs/verify/shirube-v2.1-enterprise-governance.md
exact_head_binding:
  required: true
  example_head_sha: 8b0d9698ef0c6f807550ca0ea9104a21841f715d
classification:
  risk_class: R1
  lane: Routine
  remote_publication_risk: R2
  rationale:
    - Adds docs-owned schema fixture examples.
    - Updates only allowed Shirube PR1 docs to link fixture inventory.
    - Does not add runtime code, evaluators, CI, GitHub Checks, AUN, DB, LaunchAgent, Discord, or external automation.
role_separation:
  implementation_owner: adf implementation bot
  independent_review_required:
    - L1 audit
    - L2 audit
    - QA/check
  cto_required_only_if_scope_expands: true
risk_catalog:
  - risk_class: R0
    lane: Routine
    examples:
      - Inspect docs, issues, PRs, or logs.
      - Run non-mutating validation.
    stop_condition: none
  - risk_class: R1
    lane: Routine
    examples:
      - Edit docs or fixtures locally.
      - Add local tests or examples.
    stop_condition: protected path or live behavior appears in diff
  - risk_class: R2
    lane: Routine
    examples:
      - Push a branch.
      - Open or update a PR.
      - Post an implementation handoff.
    stop_condition: remote action would merge, deploy, or alter protection
  - risk_class: R3
    lane: Protected
    examples:
      - Add CI workflow enforcement.
      - Add policy evaluator enforcement.
      - Mutate MCP, AUN queue lifecycle, or security gate behavior.
    stop_condition: protected review evidence missing
  - risk_class: R4
    lane: Stop
    examples:
      - Merge or deploy.
      - Change secrets, permissions, billing, or branch protection.
      - Destroy DB, queue, or storage state.
    stop_condition: explicit approval missing
required_evidence:
  minimum_for_this_fixture:
    - source links
    - exact head binding
    - docs-only diff confirmation
    - validation command results in handoff
  not_required_because_no_live_impact:
    - shirube-security-evidence/v1
    - shirube-db-evidence/v1
