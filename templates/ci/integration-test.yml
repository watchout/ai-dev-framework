# integration-test.yml - L2統合テストワークフロー
# ADR-010: テスト3層化 — PR時に実DB接続テストを実行

name: L2 Integration Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'app/**'
      - 'server/**'
      - 'lib/**'
      - 'prisma/**'
      - 'drizzle/**'
      - 'tests/integration/**'

jobs:
  integration-test:
    name: Integration Tests (L2)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npx prisma migrate deploy 2>/dev/null || npx drizzle-kit push 2>/dev/null || echo "No migration tool detected"
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Run L2 integration tests
        run: npx vitest run --config vitest.integration.config.ts 2>/dev/null || npx vitest run tests/integration/ 2>/dev/null || echo "No integration test config found"
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          NODE_ENV: test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            test-results/
            coverage/
          retention-days: 7
