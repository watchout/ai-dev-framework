schema_version: shirube-repo-spec/v1
repo_id: <owner/repo>
# repo is accepted as a compatibility alias during v1 migration.
# repo: <owner/repo>
canonical_core: <owner/repo>@<commit-or-tag>
purpose: <text>
non_goals: []
design_principles:
  - Machine-readable evidence is primary.
development_flow: docs/standards/shirube-ai-development-governance-standard-v1.md
required_gates:
  - repo_spec
operating_model:
  readiness:
    purpose: <text>
    gates: [repo_spec, planning]
    report_only: true
    stop_condition: <text>
  dev_loop:
    purpose: <text>
    gates: [spec_to_cell_trace, phase, design_conformance]
    report_only: true
    stop_condition: <text>
  change_flow:
    purpose: <text>
    gates: [repo_spec, change_flow_controller]
    report_only: true
    stop_condition: <text>
  phase_control:
    purpose: <text>
    state_ref: .shirube/phase-state.json
    transition_ref: scripts/shirube/phases.config.json
    report_only: true
gate_catalog:
  repo_spec:
    purpose: Validate Repository Premise Spec minimum structure.
    script: scripts/shirube/check-repo-spec.mjs
    responsible_role: repo_owner
    required_evidence:
      - .shirube/repo-spec.yaml
required_evidence:
  repo_spec:
    - .shirube/repo-spec.yaml
  planning:
    - premise_confirmation_ref
    - inventory_confirmation_ref
    - owner_confirmation_ref
  merge:
    - exact head evidence
    - machine gate output
risk_tier_policy:
  R0:
    gates: [mechanical gates]
    merge_authority: owner merge only; auto-merge candidate does not mean active auto-merge.
  R1:
    gates: [mechanical gates, semantic audit]
    merge_authority: owner merge.
  R2:
    gates: [mechanical gates, semantic audit, implementation audit when required]
    merge_authority: owner merge.
  R3:
    gates: [mechanical gates, semantic audit, human authority, staged rollout]
    merge_authority: protected human authority.
  route:ceo-approval:
    gates: [CEO ratification, protected governance review]
    merge_authority: CEO-ratified route only.
waiver_policy:
  allowed: true
  requirements:
    - waiver must target a specific Cell and check
    - waiver must include reason, compensating controls, approver, expiry, and follow-up issue
post_merge_policy:
  required: true
  no_done_without_post_merge_evidence: true
remediation_contract:
  applies_to: [WARN, BLOCK]
  fields:
    - verdict
    - current_phase
    - blocked_reason
    - missing_prerequisites
    - required_next_actions
    - responsible_role
    - allowed_next_phases
    - forbidden_next_phases
    - required_evidence
    - observed_evidence
    - reference_docs
audit_assignment:
  schema_version: shirube-audit-assignment/v1
  source_ref: <issue-or-standard-ref>
  author_must_not_audit_own_artifact: true
  roles:
    spec:
      responsibility: dispatch_author_only
      may_audit: false
    arc:
      responsibility: design_input_and_encode_only
      may_audit: false
    codex_audit:
      responsibility: formal_audit_gate
      may_audit: true
    bridge:
      responsibility: machine_admissibility_gate
    cto:
      responsibility: r3_r4_governance_authority
    ceo:
      responsibility: route_ceo_approval_and_rps_confirmation
  artifacts:
    premise_rps:
      audit_role: codex-audit
      design_input_role: arc
      author_role: spec
      gate: formal_rps_design_audit
    feature_spec:
      audit_role: codex-audit
    cell:
      audit_role: codex-audit
    impl_to_code:
      audit_role: codex-audit
    bridge_admissibility:
      audit_role: codex-audit
      machine_gate: bridge
    route_ceo_approval:
      authority_roles:
        - CEO
        - CTO when R3/R4 governance applies
    enforce:
      authority_roles:
        - CEO
        - CTO when R3/R4 governance applies
confirmation_evidence:
  rps_readiness:
    required: true
    authority_role: CEO
    authority_actor: watchout
    canonical_artifact_path: .shirube/evidence/rps-confirmation.yaml
    accepted_sinks:
      - repository_file
      - github_issue_comment
      - github_pr_comment
    github_marker: shirube:rps-confirmation/v1
    required_fields:
      - schema_version
      - record_id
      - repo
      - rps_id
      - source_pr
      - exact_head_sha
      - authority_role
      - authority_actor
      - verdict
      - created_at
      - evidence_refs
    valid_verdicts:
      - CONFIRMED
      - CHANGES_REQUIRED
      - BLOCKED
roles:
  spec: <role-or-owner>
  arc: <role-or-owner>
  design_reviewer: <role-or-owner>
  impl_runner: <role-or-owner>
  impl_reviewer: <role-or-owner>
  release_owner: <role-or-owner>
codeowners_ref: CODEOWNERS
audit_responsibilities: <text>
shared_terminology:
  Cell: Bounded implementation unit.
security_assumptions: <text>
privacy_assumptions: <text>
data_boundaries:
  - <boundary>
dependency_boundaries:
  - <boundary>
forbidden_actions:
  - <forbidden action>
ai_usage_classification: assisted
soc2_categories:
  - Security
  - Confidentiality
  - Processing Integrity
iso42001_applicability: false
agent_permission_boundary:
  allowed_paths: []
  forbidden_paths: []
  allowed_commands: []
  forbidden_commands: []
  allowed_mcp_tools: []
  approval_required_mcp_tools: []
  forbidden_mcp_tools: []
remediation:
  repo-spec:
    on_fail: Update this file to satisfy the repo-spec schema.
    doc_ref: templates/shirube-repo-spec.yaml
