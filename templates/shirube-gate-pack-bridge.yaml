shirube_gate_pack:
  schema_version: shirube-gate-pack-bridge/v1
  mode: partial_shirube_pilot
  target_repo: owner/repo
  target_pr: 0
  execution_context_ref: .shirube/execution-context.yaml
  execution_context:
    primary_repo: owner/repo
    work_order: owner/repo#0
    pr: owner/repo#0
    active_role: dev
    support_relations:
      - repo: watchout/ai-dev-framework
        relation: framework_support
      - repo: owner/control-repo
        relation: control_source
  control_source:
    type: github_issue
    ref: owner/control-repo#0
  scope:
    - "<this PR changes ...>"
  non_scope:
    - runtime architecture change
    - DB migration
    - branch protection
    - required check activation
  allowed_paths:
    - "src/safe-area/**"
  forbidden_paths:
    - ".github/workflows/**"
    - "migrations/**"
    - ".env*"
    - "secrets/**"
  protected_surfaces:
    touched: false
    declared:
      - none
  validation:
    commands:
      - "npm test"
      - "npm run lint"
    result: PASS
  exact_head_sha: "<PR_HEAD_SHA>"
  owner_decision:
    verdict: APPROVED_EXACT_HEAD
    actor: "<owner>"
    decision_ref: "<comment-url>"
  post_merge:
    required: true
