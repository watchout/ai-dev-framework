schema_version: shirube-repo-spec/v1
repo: {{TARGET_REPO}}
repo_id: {{TARGET_REPO}}
owner: {{TARGET_OWNER}}
canonical_core: {{TARGET_REPO}}@<PINNED_TARGET_HEAD>
purpose: >
  Adopt Shirube Rapid/Lite as a report-only control-plane overlay for {{PRODUCT}}
  while keeping product runtime, API, DB, package, deploy, required checks, branch
  protection, and rulesets out of this adoption PR.
scope:
  - Repo-local Shirube overlay metadata.
  - Source mirror of {{SOURCE_CONTROL}}.
  - Report-only owner-observed control policy.
non_goals:
  - Runtime code changes are not part of this adoption pack.
  - API handlers, DB schema, migrations, package files, deploy files, branch protection, rulesets, and required checks are not changed by this pack.
  - LLM output is never final authority.
  - This pack does not claim V3 complete, enforced, fully controlled, or required-check protected status.
design_principles:
  - Machine-readable evidence is primary.
  - GitHub Control issue/comment evidence may be mirrored but the mirror is not independent truth.
  - Owner exact-head decision is required before merge when a gate would block.
  - Adoption PRs must not mix runtime, API, DB, package, deploy, branch protection, ruleset, or required-check changes.
development_flow: docs/standards/shirube-ai-development-governance-standard-v1.md
required_gates:
  - execution_context
  - adoption
  - lifecycle
  - gate_contract
  - design_rules
  - enforcement_policy
  - control_state_completeness
source_of_truth_policy:
  primary_control_source: {{SOURCE_CONTROL}}
  source_mirror_ref: .shirube/source-mirrors/control-issue.yaml
  mirror_is_truth: false
  llm_final_authority: false
  owner_confirmation_required: true
rps_id: {{REPO_SPEC_ID}}
rps_scope:
  repo_owns:
    - {{PRODUCT}} repo-local implementation and evidence after explicit handoff.
    - Repo-local Shirube overlay artifacts under .shirube/**.
  repo_does_not_own:
    - ADF framework scripts and standards.
    - Control-source issue authority.
    - External repo mutation.
    - Branch protection, rulesets, required checks, and production activation in this slice.
protected_surfaces:
  declared:
    - runtime code
    - api
    - database
    - migrations
    - secrets
    - active workflows
    - required checks
    - branch protection
    - rulesets
    - production
confirmation_evidence:
  rps_readiness:
    required: true
    authority_role: owner
    authority_actor: null
    verdict: PENDING
    evidence_refs: []
required_evidence:
  adoption:
    - .shirube/execution-context.yaml
    - .shirube/adoption-intake.yaml
    - .shirube/existing-state-scan.yaml
    - .shirube/repo-spec.yaml
    - .shirube/source-mirrors/control-issue.yaml
  merge:
    - validation evidence
    - owner exact-head decision
    - control-state completeness report
  post_merge:
    - merge commit
    - merged_at
    - post-merge evidence before COMPLETE
agent_permission_boundary:
  allowed_paths:
    - .shirube/**
    - docs/shirube/**
  forbidden_paths:
    - scripts/shirube/**
    - src/**
    - app/**
    - api/**
    - lib/**
    - db/**
    - migrations/**
    - package.json
    - package-lock.json
    - pnpm-lock.yaml
    - yarn.lock
    - .env*
    - deploy/**
  allowed_commands: []
  forbidden_commands: []
  allowed_mcp_tools: []
  approval_required_mcp_tools: []
  forbidden_mcp_tools: []
