schema_version: shirube-enforcement-policy/v1
policy_id: {{ENFORCEMENT_POLICY_ID}}
repo: {{TARGET_REPO}}
mode: report_only
profile: hotel-lite
framework_ref: {{FRAMEWORK_REF}}
updated_at: {{GENERATED_AT}}
enforce_by: "{{REPORT_ONLY_ENFORCE_BY}}"
reason: "{{REPORT_ONLY_REASON}}"
stale_after_days: 90
owner_observed: true
owner:
  role: repo_owner
  actor: {{OWNER_ACTOR}}
control_points:
  - id: CP-ENFORCEMENT-POLICY-REPORT-ONLY-001
    subject: expiry_gate
    authority: deterministic-script
    enforcement:
      mode: report-only
      enforce_by: 2026-07-31
      owner: repo_owner
      reason: Bounded Rapid/Lite report-only calibration before owner-block promotion.
    evidence_required:
      - script_output
    script_ref: scripts/shirube/check-enforcement-policy.mjs
required_checks:
  enabled: false
branch_protection:
  unchanged: true
rulesets:
  unchanged: true
calibration:
  started_at: {{GENERATED_AT}}
  minimum_prs: 3
  false_positive_review_required: true
report_only_semantics:
  aggregate_would_block_sets_owner_must_not_merge: true
  ci_should_fail: false
  owner_must_not_merge_without_exception: true
promotion:
  from: report_only
  next:
    - owner_block
    - ci_hard_block
    - required_check
  required_evidence:
    - stable report-only findings
    - owner accepts warning/block policy
    - explicit protected-settings Cell before required checks
non_scope:
  - branch protection mutation
  - ruleset mutation
  - required check activation
  - CI hard-blocking
  - external repository mutation
  - runtime/API/DB/package/deploy behavior
