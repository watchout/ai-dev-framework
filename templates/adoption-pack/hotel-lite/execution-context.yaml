schema_version: shirube-execution-context/v1
mode: rapid_lite_overlay_adoption
profile: hotel-lite
primary:
  repo: {{TARGET_REPO}}
  product: {{PRODUCT}}
  work_order: {{SOURCE_CONTROL}}
  pr: {{TARGET_REPO}}#<PR_NUMBER_PENDING>
active_role: {{ACTIVE_ROLE}}
roles:
  lead:
    allowed:
      - read_control_source
      - define_scope
      - create_handoff
      - request_review
      - file_framework_feedback
    forbidden:
      - implement_product_change
      - approve_merge
      - claim_merge_ready_without_owner
  dev:
    allowed:
      - inspect_repo
      - implement_allowed_paths
      - run_validation
      - produce_impl_evidence
    forbidden:
      - change_scope_without_handoff
      - edit_forbidden_paths
      - approve_merge
      - claim_audit_pass
      - claim_merge_ready_without_owner
repo_relations:
  - repo: {{TARGET_REPO}}
    relation: primary
    allowed:
      - inspect_repo
      - implement_allowed_paths
      - run_validation
      - produce_impl_evidence
    forbidden:
      - approve_merge
      - self_approve
  - repo: {{FRAMEWORK_REPO}}
    relation: framework_support
    allowed:
      - read
      - cite
      - file_feedback
    forbidden:
      - implementation_target
      - merge_ready_claim
  - repo: {{SOURCE_REPO}}
    relation: {{CONTROL_SOURCE_RELATION}}
    control_issue_ref: {{SOURCE_CONTROL}}
    allowed:
      - read
      - cite
      - mirror_snapshot
    forbidden:
      - implementation_target
      - merge_decision
common_contract:
  primary_repo_required: true
  work_order_required: true
  active_role_required: true
  exact_head_required_for_merge_ready: true
  owner_decision_required_for_merge_ready: true
  llm_final_authority_forbidden: true
  support_repo_as_target_forbidden: true
  control_repo_as_target_forbidden: true
