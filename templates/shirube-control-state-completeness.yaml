schema_version: shirube-control-state-completeness-config/v1
control_state_id: CONTROL-STATE-EXAMPLE-001
mode: rapid-lite
profile: hotel-lite
repo: owner/repo
framework_ref: watchout/ai-dev-framework@<PINNED_COMMIT>
required_inventory:
  - execution_context_report
  - repo_spec
  - source_mirror
  - adoption_report
  - lifecycle_report
  - gate_contract_report
  - design_rule_report
  - enforcement_policy_report
  - handoff
  - validation_evidence
  - owner_exact_head_decision
  - audit_record_when_required
  - post_merge_evidence_before_complete
allowed_protected_surfaces:
  - none
  - repo_spec_confirmation_evidence
  - runtime code
  - api
  - database
  - migrations
  - secrets
  - active workflows
  - required checks
  - branch protection
  - rulesets
  - aun activation
  - production
  - deploy
rules:
  report_failures_are_blocking: true
  blocked_gate_prevents_lifecycle_progress: true
  owner_decision_exact_head_required: true
  full_control_claim_requires_full_readiness: true
  post_merge_evidence_required_before_complete: true
non_scope:
  - required check activation
  - branch protection mutation
  - ruleset mutation
  - runtime behavior change
  - external repository mutation
