schema_version: shirube-repo-spec/v1
repo: watchout/ai-dev-framework
repo_id: watchout/ai-dev-framework
owner: watchout
canonical_core: watchout/ai-dev-framework@f9345bd
purpose: >
  Own the Shirube control-plane assets used to define, scaffold, validate, and
  dogfood AI development governance across repositories under Shirube AI
  Development Governance Standard v1.
scope:
  - Shirube standards
  - schemas
  - templates
  - rubrics
  - CLI gate/conveyor logic
  - script-gate report-only controls
  - workflow scaffolds and report-only pilot workflows
  - golden cases
  - control-plane rollout instructions
non_goals:
  - Target repository runtime behavior is not owned by this repo.
  - Protected automation changes are not authorized without a later explicit Cell.
  - Required GitHub checks are not activated by this scaffold.
  - Branch protection, rulesets, deploy settings, and production state are not managed by this scaffold.
  - External repository mutation is not authorized from this repo-spec alone.
design_principles:
  - Development unit is Cell, not PR.
  - Canonical chain is Spec -> Cell -> Impl -> Code -> Test -> Evidence.
  - Machine-readable evidence is primary; narrative can explain but not override missing facts.
  - Goal-directed bounded execution is allowed only inside explicit Cell boundaries.
  - Merge authority remains separate from goal-mode implementation.
  - Shirube owns phase authority; LLM and agent runners execute within declared phase bounds.
development_flow: docs/standards/shirube-ai-development-governance-standard-v1.md
required_gates:
  - repo_spec
  - planning
  - spec_to_cell_trace
  - phase
  - design_conformance
  - readiness_controller
  - dev_loop_controller
  - change_flow_controller
operating_model:
  readiness:
    purpose: Confirm repository premise, planning prerequisites, and owner evidence before implementation handoff.
    gates:
      - repo_spec
      - planning
    report_only: true
    stop_condition: Missing premise, inventory, owner confirmation, or repo-spec structure blocks progression evidence.
  dev_loop:
    purpose: Keep Cell execution bounded by trace, phase, and design conformance signals.
    gates:
      - spec_to_cell_trace
      - phase
      - design_conformance
    report_only: true
    stop_condition: Trace gaps, invalid phase transitions, or unmapped controls block execution readiness evidence.
  change_flow:
    purpose: Prevent governed code, script, schema, template, or workflow changes from bypassing Spec and Cell artifacts.
    gates:
      - repo_spec
      - change_flow_controller
    report_only: true
    stop_condition: Governed changed files require current Spec and Cell artifacts.
  phase_control:
    purpose: Preserve deterministic progression from repo-spec confirmation through release evidence.
    state_ref: .shirube/phase-state.json
    transition_ref: scripts/shirube/phases.config.json
    report_only: true
gate_catalog:
  repo_spec:
    purpose: Validate Repository Premise Spec minimum structure and migration warnings.
    script: scripts/shirube/check-repo-spec.mjs
    responsible_role: repo_owner
    required_evidence:
      - .shirube/repo-spec.yaml
      - schemas/shirube-repo-spec.schema.json
  planning:
    purpose: Validate premise, inventory, and owner confirmation references before Cell/Impl progression.
    script: scripts/shirube/check-planning.mjs
    responsible_role: domain_designer
    required_evidence:
      - premise_confirmation_ref
      - inventory_confirmation_ref
      - owner_confirmation_ref
  spec_to_cell_trace:
    purpose: Validate every requirement maps to a bounded Cell with risk tier and allowed paths.
    script: scripts/shirube/check-trace.mjs
    responsible_role: shirube_command_owner
    required_evidence:
      - .shirube/specs/
      - .shirube/cells/
  phase:
    purpose: Validate current phase and allowed next phases from deterministic phase config.
    script: scripts/shirube/check-phase.mjs
    responsible_role: shirube_command_owner
    required_evidence:
      - .shirube/phase-state.json
      - scripts/shirube/phases.config.json
  design_conformance:
    purpose: Validate design-conformance matrix mapping existence without meaning judgments.
    script: scripts/shirube/check-conformance.mjs
    responsible_role: domain_designer
    required_evidence:
      - .shirube/design-conformance-matrix.json
  readiness_controller:
    purpose: Aggregate repo-spec and planning gates as the readiness signal.
    script: scripts/shirube/controller.mjs readiness
    responsible_role: release_owner
    required_evidence:
      - repo_spec gate output
      - planning gate output
  dev_loop_controller:
    purpose: Aggregate trace, phase, and design-conformance gates as the dev-loop signal.
    script: scripts/shirube/controller.mjs dev-loop
    responsible_role: release_owner
    required_evidence:
      - spec_to_cell_trace gate output
      - phase gate output
      - design_conformance gate output
  change_flow_controller:
    purpose: Validate governed changed files have current Spec and Cell artifacts.
    script: scripts/shirube/controller.mjs change-flow
    responsible_role: implementation_owner
    required_evidence:
      - changed file list
      - current Spec artifact
      - current Cell artifact
required_evidence:
  repo_spec:
    - .shirube/repo-spec.yaml
  planning:
    - premise_confirmation_ref when premise_required is true
    - inventory_confirmation_ref when inventory_required is true
    - owner_confirmation_ref when owner_confirmation_required is true
  cell_execution:
    - current Spec artifact
    - current Cell artifact
    - current Impl artifact when risk tier requires it
    - required test mapping when risk tier requires it
    - execution contract when risk tier requires it
  merge:
    - machine gate output
    - semantic audit output when risk tier requires it
    - exact head evidence
  post_merge:
    - merge commit evidence
    - post-merge smoke or explicit N/A evidence
    - release or rollback decision owner
risk_tier_policy:
  R0:
    gates:
      - mechanical gates
    merge_authority: owner merge only; auto-merge candidate does not mean active auto-merge.
  R1:
    gates:
      - mechanical gates
      - one standardized semantic audit
    merge_authority: owner merge.
  R2:
    gates:
      - mechanical gates
      - one standardized semantic audit
      - implementation audit where required
    merge_authority: owner merge.
  R3:
    gates:
      - mechanical gates
      - semantic audit
      - human authority
      - staged rollout
    merge_authority: protected human authority.
  route:ceo-approval:
    gates:
      - CEO ratification
      - protected governance review
    merge_authority: CEO-ratified route only.
waiver_policy:
  allowed: true
  requirements:
    - waiver must target a specific Cell and check
    - waiver must include reason, compensating controls, approver, expiry, and follow-up issue
    - expired waiver blocks skipped required gates
  non_goals:
    - waiver does not permanently bypass hard blocks
    - waiver does not enable required checks, branch protection, or production behavior
post_merge_policy:
  required: true
  evidence:
    - approved head SHA
    - merge commit SHA
    - merged_by
    - merged_at_utc
    - post_merge_smoke or explicit N/A
    - release_or_rollback_decision
  no_done_without_post_merge_evidence: true
remediation_contract:
  applies_to:
    - WARN
    - BLOCK
  fields:
    - verdict
    - current_phase
    - blocked_reason
    - missing_prerequisites
    - required_next_actions
    - responsible_role
    - allowed_next_phases
    - forbidden_next_phases
    - required_evidence
    - observed_evidence
    - reference_docs
  purpose: >
    Every warned or blocked report-only script gate must tell the caller what
    is missing, who owns the next action, what evidence is required, and which
    phases remain forbidden until the missing machine facts are supplied.
audit_assignment:
  schema_version: shirube-audit-assignment/v1
  source_ref: https://github.com/watchout/ai-dev-framework/issues/450#issuecomment-4761272721
  author_must_not_audit_own_artifact: true
  roles:
    spec:
      responsibility: dispatch_author_only
      may_audit: false
    arc:
      responsibility: design_input_and_encode_only
      may_audit: false
    codex_audit:
      responsibility: formal_audit_gate
      may_audit: true
    bridge:
      responsibility: machine_admissibility_gate
    cto:
      responsibility: r3_r4_governance_authority
    ceo:
      responsibility: route_ceo_approval_and_rps_confirmation
  artifacts:
    premise_rps:
      audit_role: codex-audit
      design_input_role: arc
      author_role: spec
      gate: formal_rps_design_audit
    feature_spec:
      audit_role: codex-audit
    cell:
      audit_role: codex-audit
    impl_to_code:
      audit_role: codex-audit
    bridge_admissibility:
      audit_role: codex-audit
      machine_gate: bridge
    route_ceo_approval:
      authority_roles:
        - CEO
        - CTO when R3/R4 governance applies
    enforce:
      authority_roles:
        - CEO
        - CTO when R3/R4 governance applies
confirmation_evidence:
  rps_readiness:
    required: true
    verdict: CONFIRMED
    authority_role: CEO
    authority_actor: watchout
    canonical_artifact_path: .shirube/evidence/rps-confirmation.yaml
    evidence_ref: https://github.com/watchout/ai-dev-framework/pull/462#issuecomment-4761494340
    accepted_sinks:
      - repository_file
      - github_issue_comment
      - github_pr_comment
    github_marker: shirube:rps-confirmation/v1
    required_fields:
      - schema_version
      - record_id
      - repo
      - rps_id
      - source_pr
      - exact_head_sha
      - authority_role
      - authority_actor
      - verdict
      - created_at
      - evidence_refs
    valid_verdicts:
      - CONFIRMED
      - CHANGES_REQUIRED
      - BLOCKED
roles:
  spec: shirube-spec
  arc: shirube-arc
  design_reviewer: shirube-design-reviewer
  impl_runner: codex-adf
  impl_reviewer: shirube-command
  release_owner: watchout
  repo_owner: watchout
  security_owner: watchout
  evidence_owner: watchout
  implementation_owner: codex-adf
  command_review_owner: shirube-command
codeowners_ref: CODEOWNERS
audit_responsibilities: >
  Script gates provide deterministic prerequisite, trace, phase, and mapping
  evidence. Meaning audits, implementation audits, code audits, and release
  decisions remain independent reviewer responsibilities.
shared_terminology:
  Goal: User-approved outcome boundary.
  Phase: Script-controlled progression state.
  Cell: Bounded implementation unit.
  Impl: Cell implementation contract and execution plan.
  Evidence: Machine-readable artifact or durable run output.
  Report-only: A non-required signal that records would-block findings without enforcement.
security_assumptions: >
  Report-only script gates may read repository artifacts and PR metadata but
  must not read secrets, mutate protected settings, or dispatch external agents.
privacy_assumptions: >
  Shirube governance artifacts do not require customer or personal data. Any
  future workflow handling such data requires a separate approved Cell.
data_boundaries:
  - No customer data processing is authorized by this scaffold.
  - No secrets may be read, copied, generated, or written.
  - No target repository data may be mutated by script-gate pilot workflows.
dependency_boundaries:
  - No new runtime or development dependencies are authorized by this scaffold.
  - Script gates should use repository-local Node scripts and platform tools already available in CI.
  - Workflow changes are report-only until a later protected-settings Cell authorizes enforcement.
forbidden_actions:
  - Do not enable required checks.
  - Do not modify branch protection or rulesets.
  - Do not activate AUN, Discord, DB, queue, LaunchAgent, or production automation.
  - Do not dispatch agents or mutate external repositories.
  - Do not claim full Shirube rollout completion from report-only evidence alone.
ai_usage_classification: agentic
soc2_categories:
  - Security
  - Confidentiality
  - Processing Integrity
iso42001_applicability: true
agent_permission_boundary:
  allowed_paths:
    - .shirube/**
    - docs/**
    - schemas/**
    - templates/**
    - scripts/shirube/**
    - test/shirube/**
    - test/fixtures/shirube/**
    - .github/workflows/shirube-gates-report.yml
  forbidden_paths:
    - src/**
    - lib/**
    - bin/**
    - package.json
    - package-lock.json
    - pnpm-lock.yaml
    - deploy/**
    - .env
    - .env.*
    - private-config/**
    - secrets/**
  allowed_commands:
    - node scripts/shirube/check-repo-spec.mjs
    - node scripts/shirube/check-planning.mjs
    - node scripts/shirube/check-trace.mjs
    - node scripts/shirube/check-phase.mjs
    - node scripts/shirube/check-conformance.mjs
    - node scripts/shirube/controller.mjs readiness
    - node scripts/shirube/controller.mjs dev-loop
    - node scripts/shirube/controller.mjs change-flow
    - npm run lint
    - npm run type-check
    - npm run build:cli
    - npm test
  forbidden_commands:
    - gh pr merge
    - branch protection mutation
    - ruleset mutation
    - required check activation
    - target repository mutation
    - AUN, Discord, DB, queue, LaunchAgent, production, or multi-agent activation
  allowed_mcp_tools: []
  approval_required_mcp_tools: []
  forbidden_mcp_tools:
    - live AUN dispatch/apply/send
    - external repository mutation
    - branch protection or ruleset mutation
remediation:
  repo-spec:
    on_fail: Update .shirube/repo-spec.yaml to satisfy schemas/shirube-repo-spec.schema.json.
    doc_ref: templates/shirube-repo-spec.yaml
  planning:
    on_fail: Add premise, inventory, or owner confirmation references before Cell/Impl progression.
    doc_ref: docs/standards/shirube-ai-development-governance-standard-v1.md
  spec-to-cell-trace:
    on_fail: Ensure every REQ-ID maps to a Cell and every Cell has allowed_paths and risk_tier.
    doc_ref: .shirube/cells/
  phase:
    on_fail: Declare a valid current phase and use only allowed phase transitions.
    doc_ref: scripts/shirube/phases.config.json
  design-conformance:
    on_fail: Add control mapping entries with mapped_impl and mapped_test only.
    doc_ref: .shirube/design-conformance-matrix.json
  readiness_controller:
    on_fail: Resolve repo-spec or planning gate findings.
    doc_ref: scripts/shirube/controller.mjs
  dev_loop_controller:
    on_fail: Resolve trace, phase, or conformance gate findings.
    doc_ref: scripts/shirube/controller.mjs
  change_flow_controller:
    on_fail: Add current PR spec and Cell artifacts for governed changes.
    doc_ref: scripts/shirube/controller.mjs
boundaries:
  allowed_paths:
    - .shirube/**
    - docs/**
    - schemas/**
    - templates/**
    - scripts/shirube/**
    - test/shirube/**
    - test/fixtures/shirube/**
    - .github/workflows/shirube-gates-report.yml
  forbidden_paths:
    - src/**
    - lib/**
    - bin/**
    - package.json
    - package-lock.json
    - pnpm-lock.yaml
    - deploy/**
    - .env
    - private-config/**
  data_boundaries:
    - No customer data processing is authorized by this scaffold.
    - No secrets may be read, copied, generated, or written.
    - No target repository data may be mutated.
  dependency_boundaries:
    - No new runtime or development dependencies are authorized by this scaffold.
    - Active workflows remain report-only unless separately approved.
  forbidden_actions:
    - Do not enable required checks.
    - Do not modify branch protection or rulesets.
    - Do not activate AUN, Discord, DB, queue, LaunchAgent, or production automation.
    - Do not dispatch agents or mutate external repositories.
risk_tier_defaults: R2
standards:
  soc2:
    - Security
    - Confidentiality
    - Processing Integrity
  iso_iec_42001: Apply when AI behavior, tools, memory, prompts, or model routing are in scope.
  engineering_references:
    - NIST_SSDF
    - OWASP_LLM_TOP_10
    - SLSA
agent_policy_ref: .shirube/agent-policy.yaml
evidence_ledger_ref: .shirube/evidence/
