  shirube_owns:
    - Generic reusable Rapid/Lite report workflow in ADF.
    - Target-repo thin workflow caller template for report-only pilots.
    - Optional adoption-pack caller rendering and safety checking.
    - PR-local Shirube evidence artifacts for this workflow-caller slice.
