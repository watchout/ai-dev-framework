schema_version: shirube-control-handoff/rapid-lite/v1
mode: rapid-lite
profile: hotel-lite
flow: full_operational
control_handoff_id: CH-ADF-V3-RAPID-DELIVERY-ACCELERATOR-001
parent: "#487 / #522 / #523"
parent_ssot: https://github.com/watchout/ai-dev-framework/issues/487
work_order: watchout/ai-dev-framework#487
pr: pending-draft-pr
repo_local_issue: https://github.com/watchout/ai-dev-framework/issues/487
matrix_ref: .shirube/gate-contracts/shirube-v3-rapid-lite-gate-contract-matrix.yaml
framework_ref: watchout/ai-dev-framework@6af34058cf2d8298fca159419cdc35a7eb42b12c
repo_spec_ref: .shirube/repo-spec.yaml
premise_ref: .shirube/repo-spec.yaml
owner_confirmation_ref: .shirube/evidence/rps-confirmation.yaml
premise_confirmation_ref: .shirube/evidence/rps-confirmation.yaml
spec_review_state: ready_for_implementation
ready_for_implementation: true
audit_required: true
review_plan_required: true
owner:
  role: repo_owner
  actor: watchout
next_role: independent_audit
rps_scope:
  shirube_owns:
    - Cell batch policy for low-risk docs, metadata, evidence, and ledger Cells.
    - PR unit planning that may cover multiple Cells.
    - Audit unit composition for one exact PR head.
    - Scoped re-audit classification after rebase or conflict resolution.
    - Conveyor planning that chooses PR units instead of silently assuming one PR per Cell.
  shirube_does_not_own:
    - Independent audit synthesis.
    - Owner approval synthesis.
    - Automatic merge.
    - Required check activation.
    - Branch protection or ruleset mutation.
    - DB runtime, MCP implementation, or AUN runtime/queue mutation.
    - Target repository mutation except explicit future draft PR creation.
    - Runtime/API/DB/product/package/lockfile changes.
cell:
  CELL-ID: CELL-ADF-V3-RAPID-DELIVERY-ACCELERATOR-001
  cell_type: governance_gate
  risk_class: R3
  goal: Add Rapid Delivery Accelerator support so Shirube can batch safe low-risk Cells into PR units, compose exact-head audit units, classify scoped re-audit after metadata-only head changes, and let Conveyor plan PR units without bypassing audit, additional review, owner approval, or merge gates.
  acceptance_criteria:
    - R1 docs-only Cells with the same parent SSOT batch into one PR unit.
    - R1 docs-only plus metadata/evidence completion Cells batch into one PR unit.
    - R1 docs-only plus R2 runtime foundation do not batch by default.
    - DB/migration changes prevent batching.
    - Workflow changes prevent batching unless a later protected route explicitly allows them.
    - Multiple Cells in one PR produce one audit unit with all Cell-specific item sets.
    - Owner decision remains per PR exact head, not per Cell.
    - Rebase with functional diff unchanged allows scoped re-audit but keeps owner/merge blocked until scoped re-audit completes.
    - Conflict resolution restoring active handoff only allows scoped re-audit.
    - Rebase introducing runtime/API change requires full re-audit.
    - Stale exact_head in PR metadata requires metadata refresh before audit or owner decision.
    - Conveyor plan emits PR units and audit units, not one PR per Cell by default.
    - Conveyor blocks ambiguous batch ordering with request_owner_planning_decision.
    - No audit synthesis, owner approval synthesis, or automatic merge is introduced.
  non_scope:
    - independent audit synthesis
    - owner approval synthesis
    - automatic merge
    - required check activation
    - branch protection mutation
    - ruleset mutation
    - DB runtime
    - MCP implementation
    - AUN queue mutation
    - target repository mutation except explicit future draft PR creation
    - runtime/API/DB/product changes
    - package or lockfile changes
  allowed_paths:
    - .shirube/work-orders/487/rapid-delivery-accelerator/**
    - docs/standards/shirube-conveyor-state-machine.md
    - docs/standards/shirube-rapid-delivery-accelerator.md
    - schemas/shirube/audit-unit.v1.schema.json
    - schemas/shirube/cell-batch-policy.v1.schema.json
    - src/cli/commands/audit-unit.ts
    - src/cli/commands/conveyor.ts
    - src/cli/commands/re-audit.ts
    - src/cli/index.ts
    - src/cli/lib/conveyor-state-machine.ts
    - src/cli/lib/rapid-delivery-accelerator.ts
    - test/fixtures/shirube/rapid-delivery-accelerator/**
    - test/shirube/rapid-delivery-accelerator.test.ts
  forbidden_paths:
    - app/**
    - api/**
    - db/**
    - migrations/**
    - package.json
    - package-lock.json
    - pnpm-lock.yaml
    - yarn.lock
    - .env*
    - deploy/**
    - deployment/**
    - .github/workflows/**
    - .github/branch-protection/**
    - .github/rulesets/**
  protected_surfaces:
    declared:
      - permissions
      - runtime
    touched: true
    reason: This slice changes local/report-only Shirube control-plane planning logic. It adds no runtime product behavior, DB runtime, AUN queue mutation, required checks, branch protection, rulesets, target repo mutation, audit synthesis, owner approval synthesis, or merge execution.
  stop_conditions:
    - independent audit is synthesized
    - owner approval is synthesized
    - automatic merge is added
    - required checks are activated
    - branch protection or rulesets are mutated
    - DB runtime is added
    - MCP implementation is added
    - AUN queue mutation is added
    - target repository mutation is added outside explicit future draft PR creation
    - runtime/API/DB/product/package/lockfile change is added
validation:
  required_commands:
    - npm run test -- test/shirube/rapid-delivery-accelerator.test.ts
    - npm run test -- test/shirube/conveyor-state-machine.test.ts test/shirube/rapid-delivery-accelerator.test.ts
    - npm run test -- test/shirube
    - npm run type-check
    - npm run build:cli
    - npm run lint
    - git diff --check origin/main...HEAD
  required_evidence:
    - PR_head_SHA
    - changed_files
    - validation_commands
    - validation_results
    - owner_decision
owner_decision:
  required_before_merge: true
  blocked_until:
    - independent_audit_complete
    - required_additional_reviews_complete
  allowed_verdicts:
    - APPROVED_EXACT_HEAD
    - CHANGES_REQUIRED
    - BLOCKED
  exact_head_sha: null
  decision_ref: .shirube/work-orders/487/rapid-delivery-accelerator/owner-decision-pending.yaml
legacy_source_boundary:
  legacy_sources_may_inform: true
  legacy_sources_are_truth: false
  required_current_truth_ref: https://github.com/watchout/ai-dev-framework/issues/487
