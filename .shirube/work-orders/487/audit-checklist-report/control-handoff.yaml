rps_scope:
  shirube_owns:
    - Local/report-only Rapid/Lite report integration for Audit Checklist P0.
    - Control State Completeness consumption of audit checklist reports.
    - PR-local Shirube evidence artifacts for this integration slice.
  shirube_does_not_own:
    - Required check activation, branch protection, rulesets, runtime, product, package, lockfile, external repo, multi-model judge, calibrated abstention, refutation/debate, or audit corpus behavior.
cell:
  CELL-ID: CELL-ADF-V3-AUDIT-CHECKLIST-REPORT-001
  cell_type: code_lite
  risk_class: R2
  goal: Make Audit Checklist P0 part of the standard Rapid/Lite report path while keeping audit execution conditional.
  acceptance_criteria:
    - Rapid/Lite report discovers audit checklist refs and writes audit-checklist.json when checklist evidence is present.
    - Audit checklist BLOCKED makes the aggregate would_block=true.
    - Audit checklist FAILURE makes the aggregate report_failed=true and would_block=true.
    - Control State Completeness consumes audit checklist reports and propagates AUDIT-LIST blockers.
    - Missing audit checklist evidence is only blocking when handoff, profile, or risk requires audit acceptance.
  non_scope:
    - required check activation
    - branch protection or ruleset mutation
    - runtime/API/DB/product/package/lockfile changes
    - external repository mutation
    - multi-model judge orchestration
    - calibrated abstention thresholds
    - refutation or debate requirement
    - ground-truth audit corpus
    - final V3 readiness claim
  allowed_paths:
    - .shirube/work-orders/487/audit-checklist-report/**
    - docs/standards/shirube-audit-checklist.md
    - docs/standards/shirube-control-state-completeness.md
    - docs/standards/shirube-gate-pack-bridge.md
    - scripts/shirube/check-control-state-completeness.mjs
    - scripts/shirube/run-rapid-lite-report.mjs
    - test/fixtures/shirube/control-state-completeness/audit-checklist*.json
    - test/fixtures/shirube/rapid-lite-report/audit*.yaml
    - test/fixtures/shirube/rapid-lite-report/pr-body.audit-checklist*.md
    - test/shirube/control-state-completeness.test.ts
    - test/shirube/rapid-lite-report.test.ts
  forbidden_paths:
    - .github/workflows/**
    - .github/branch-protection/**
    - .github/rulesets/**
    - src/**
    - app/**
    - api/**
    - lib/**
    - db/**
    - migrations/**
    - package.json
    - package-lock.json
    - pnpm-lock.yaml
    - yarn.lock
    - .env*
    - deploy/**
    - deployment/**
  protected_surfaces:
    declared:
      - none
    touched: false
    reason: Governance, audit, and protected-surface wording appears in docs/evidence only; this slice does not modify protected settings or protected runtime surfaces.
  stop_conditions:
    - changed file outside allowed_paths
    - forbidden path touched
    - required check activation added
    - branch protection or ruleset mutation added
    - runtime/API/DB/product/package/lockfile change added
    - external repo mutation added
