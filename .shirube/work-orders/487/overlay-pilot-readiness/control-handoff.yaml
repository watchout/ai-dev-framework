    - CHANGES_REQUIRED
    - BLOCKED
  target_head: 6917720d0ea02fe96f3b7752aa802bc135ec1b19
  exact_head_sha: pending-owner-final-decision
  decision_ref: .shirube/work-orders/487/overlay-pilot-readiness/owner-decision-pending.yaml
post_merge_policy:
