cell:
  CELL-ID: CELL-ADF-V3-OVERLAY-PILOT-READINESS-001
  cell_type: code_lite
  risk_class: R2
  goal: Add a local report-only gate that blocks target adoption PR creation when the generated overlay would already produce Rapid/Lite BLOCKED.
  acceptance_criteria:
    - Same-repo source control renders without triggering CTX-006.
    - Rendered packs require owner actor, owner confirmation ref, and concrete CELL-ID before pilot readiness.
    - Generated lifecycle state is accepted by check-lifecycle during dry-run.
    - External exact-head evidence is documented as outside the committed attested head.
    - check-overlay-pilot-readiness runs check-adoption-pack and run-rapid-lite-report against the generated overlay.
    - would_block=true in the generated overlay dry-run blocks pilot readiness.
  non_scope:
    - live GitHub fetch
    - external repository mutation
    - target repository PR creation
    - required check activation
    - branch protection or ruleset mutation
    - runtime/API/DB/product/package changes
    - final framework readiness claim
    - heavy #505 flow/gate hardening features
  allowed_paths:
    - .shirube/work-orders/487/overlay-pilot-readiness/**
    - docs/standards/shirube-adoption-pack-check.md
    - docs/standards/shirube-overlay-adoption-pack.md
    - docs/standards/shirube-overlay-pilot-readiness.md
    - docs/standards/shirube-rapid-lite-workflow-caller.md
    - scripts/shirube/check-control-state-completeness.mjs
    - scripts/shirube/check-execution-context.mjs
    - scripts/shirube/check-overlay-pilot-readiness.mjs
    - scripts/shirube/render-adoption-pack.mjs
    - templates/adoption-pack/hotel-lite/adoption-intake.yaml
    - templates/adoption-pack/hotel-lite/control-handoff.yaml
    - templates/adoption-pack/hotel-lite/enforcement-policy.yaml
    - templates/adoption-pack/hotel-lite/execution-context.yaml
    - templates/adoption-pack/hotel-lite/lifecycle-state.yaml
    - templates/adoption-pack/hotel-lite/repo-spec.yaml
    - templates/adoption-pack/hotel-lite/source-mirror.github-issue.yaml
    - test/fixtures/shirube/overlay-pilot-readiness/**
    - test/shirube/adoption-pack-check.test.ts
    - test/shirube/adoption-pack.test.ts
    - test/shirube/overlay-pilot-readiness.test.ts
    - test/shirube/source-mirror.test.ts
    - test/shirube/workflow-caller.test.ts
  forbidden_paths:
    - .github/workflows/**
    - src/**
    - app/**
    - api/**
    - lib/**
    - db/**
    - migrations/**
    - package.json
    - package-lock.json
    - pnpm-lock.yaml
    - yarn.lock
    - .env*
    - deploy/**
    - deployment/**
    - .github/branch-protection/**
    - .github/rulesets/**
  protected_surfaces:
    declared:
      - none
    touched: false
    reason: This slice adds local/report-only scripts, docs, templates, and tests. It does not change active workflows or protected repository settings.
  stop_conditions:
    - changed file outside allowed_paths
    - forbidden path touched
    - active workflow change added
    - required check activation added
    - branch protection or ruleset mutation added
    - CI hard-blocking added
    - runtime/API/DB/product/package/lockfile change added
    - external repo mutation added
validation:
  required_commands:
    - npm run test -- test/shirube/overlay-pilot-readiness.test.ts
    - node scripts/shirube/render-adoption-pack.mjs sample command with --include-workflow-caller
    - node scripts/shirube/check-overlay-pilot-readiness.mjs sample command
    - npm run test -- test/shirube
    - npm run type-check
    - npm run build:cli
    - npm run lint
    - git diff --check origin/main...HEAD
  required_evidence:
    - pr_head_sha
    - changed_files
    - validation_commands
    - validation_results
    - owner_decision
owner_decision:
  required_before_merge: true
  allowed_verdicts:
