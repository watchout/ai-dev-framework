schema_version: shirube-control-state-completeness-config/v1
control_state_id: CONTROL-STATE-ADF-V3-AUN-CLI-SURFACE-001
mode: rapid-lite
profile: hotel-lite
repo: watchout/ai-dev-framework
framework_ref: watchout/ai-dev-framework@fa246de7ca5781030e07e3b5b6c8e46eae60c503
required_inventory:
  - execution_context_report
  - repo_spec
  - adoption_report
  - lifecycle_report
  - gate_contract_report
  - design_rule_report
  - enforcement_policy_report
  - handoff
  - validation_evidence
  - owner_exact_head_decision
  - post_merge_evidence_before_complete
allowed_protected_surfaces:
  - none
  - repo_spec_confirmation_evidence
  - database
  - permissions
  - database_projection_contract
  - permissions_contract
  - evidence_contract
  - aun_orchestration_contract
rules:
  execution_context_required: true
  report_failures_are_blocking: true
  blocked_gate_prevents_lifecycle_progress: true
  owner_decision_exact_head_required: true
  full_control_claim_requires_full_readiness: true
  post_merge_evidence_required_before_complete: true
non_scope:
  - AUN queue mutation from Shirube
  - AUN runtime execution
  - shared DB mandatory mode
  - DB migrations or DB connection code
  - MCP implementation
  - required check activation
  - branch protection mutation
  - ruleset mutation
  - owner approval synthesis
