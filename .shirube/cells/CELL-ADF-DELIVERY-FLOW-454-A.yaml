execution_contract:
  canonical_term: Goal-directed bounded execution
  shorthand: Goal-mode Implementation
  allowed_commands:
    - git diff --check origin/codex/script-gate-report-only...HEAD
    - npx vitest run test/shirube/script-gates.test.ts
    - node scripts/shirube/check-repo-spec.mjs
    - node scripts/shirube/check-planning.mjs
    - node scripts/shirube/check-trace.mjs
    - node scripts/shirube/check-phase.mjs
    - node scripts/shirube/check-conformance.mjs
    - node scripts/shirube/controller.mjs readiness
    - node scripts/shirube/controller.mjs dev-loop
    - node scripts/shirube/controller.mjs change-flow
    - npm run lint
    - npm run type-check
    - npm run build:cli
  forbidden_commands:
    - gh pr merge
    - branch protection or ruleset mutation
    - required check activation
    - target repository mutation
    - AUN, Discord, DB, queue, LaunchAgent, production, deploy, or multi-agent activation
  handoff_conditions:
    - PR #453 dependency remains open or merged
    - draft stacked PR opened against codex/script-gate-report-only if #453 is not merged
    - ARC / CEO / Shirube command review remains pending
  completion_evidence:
    - changed files
    - exact head SHA
    - commands run
    - test results
    - local gate results
    - non-scope confirmation
